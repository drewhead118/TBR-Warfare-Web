<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBR Warfare Tournament</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tournament-view.css">
</head>
<body>
  <div class="tournament-shell">
    <header class="tournament-header">
      <div>
        <p class="eyebrow">Live Bracket View</p>
        <h1>Tournament Tree</h1>
        <p id="tournamentStatus" class="status-copy">Waiting for an active tournament.</p>
      </div>
      <div class="tournament-actions">
        <span id="tournamentUpdatedAt" class="updated-at">No sync yet</span>
        <a href="index.html" class="action-link">Back To Battle</a>
      </div>
    </header>

    <main class="tournament-stage">
      <canvas id="tournamentCanvas" width="1600" height="900"></canvas>
      <div class="stage-hint">Drag to pan. Mousewheel to zoom. The bracket updates live from the battle page.</div>
    </main>
  </div>

  <script src="tournament-view.js"></script>
</body>
</html>
